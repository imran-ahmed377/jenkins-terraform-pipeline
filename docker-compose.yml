services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
      args:
        TERRAFORM_VERSION: "1.8.5"
    container_name: jenkins-server
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  jenkins_home:
